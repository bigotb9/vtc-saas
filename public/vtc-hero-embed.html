<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VTC Hero</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#030810}
canvas{position:fixed;inset:0;display:block}
.panel-wrap{
  position:fixed;right:clamp(3%,5vw,7%);top:50%;transform:translateY(-50%);
  z-index:20;font-family:'Segoe UI',system-ui,sans-serif;
}
.panel{
  background:rgba(5,14,26,.6);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.12);border-radius:18px;
  padding:22px 26px;min-width:210px;
  box-shadow:0 8px 48px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.07);
}
.ptitle{
  font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.45);margin-bottom:16px;
  display:flex;align-items:center;gap:6px;
}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;
  animation:bl 2.4s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.25}}
.kpi{margin-bottom:14px}
.kpi:last-child{margin-bottom:0}
.klabel{font-size:11px;color:rgba(255,255,255,.42);letter-spacing:.05em;margin-bottom:2px}
.kval{font-size:1.55rem;font-weight:800;color:#fff;line-height:1}
.ksub{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
.kval.or{color:#FF6A00}
.kval.gr{color:#22c55e}
.kval.tl{color:#00D4FF}
.sep{height:1px;background:rgba(255,255,255,.07);margin:12px 0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="panel-wrap">
  <div class="panel">
    <div class="ptitle"><span class="dot"></span>Tableau de bord live</div>
    <div class="kpi"><div class="klabel">Véhicules actifs</div><div class="kval or">17</div></div>
    <div class="sep"></div>
    <div class="kpi"><div class="klabel">Chauffeurs</div><div class="kval">38</div></div>
    <div class="sep"></div>
    <div class="kpi"><div class="klabel">CA ce mois</div><div class="kval gr">2,4M</div><div class="ksub">FCFA</div></div>
    <div class="sep"></div>
    <div class="kpi"><div class="klabel">Commission Yango</div><div class="kval tl">2,5%</div></div>
  </div>
</div>

<!-- Three.js en script classique (pas d'importmap) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  var W=innerWidth,H=innerHeight;
  var renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(W,H);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;

  var scene=new THREE.Scene();
  scene.background=new THREE.Color(0x030810);
  scene.fog=new THREE.FogExp2(0x030810,.02);

  var camera=new THREE.PerspectiveCamera(62,W/H,.3,200);
  camera.position.set(0,2.8,-1);
  camera.lookAt(0,1.2,20);

  scene.add(new THREE.HemisphereLight(0x112244,.05,.35));
  scene.add(new THREE.AmbientLight(0x0a1530,.6));

  // Road
  var road=new THREE.Mesh(new THREE.PlaneGeometry(12,200),
    new THREE.MeshStandardMaterial({color:0x0d1117,roughness:.9}));
  road.rotation.x=-Math.PI/2;road.position.z=80;scene.add(road);

  // Lane markings
  for(var i=0;i<30;i++){
    var m=new THREE.Mesh(new THREE.PlaneGeometry(.12,3),
      new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.32}));
    m.rotation.x=-Math.PI/2;m.position.set(0,.01,i*6+2);scene.add(m);
  }
  [-5.5,5.5].forEach(function(x){
    var l=new THREE.Mesh(new THREE.PlaneGeometry(.06,200),
      new THREE.MeshBasicMaterial({color:0xffff00,transparent:true,opacity:.22}));
    l.rotation.x=-Math.PI/2;l.position.set(x,.01,80);scene.add(l);
  });

  // Sidewalks
  [-7.5,7.5].forEach(function(x){
    var sw=new THREE.Mesh(new THREE.BoxGeometry(3,.12,200),
      new THREE.MeshStandardMaterial({color:0x1a1f2e,roughness:.8}));
    sw.position.set(x,.06,80);scene.add(sw);
  });

  // Buildings
  function mkBuilding(x,z,w,h,d){
    var mesh=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
      new THREE.MeshStandardMaterial({color:0x0d1520,roughness:.85}));
    mesh.position.set(x,h/2,z);scene.add(mesh);
    var rows=Math.floor(h/1.4),cols=Math.floor(w/1.2);
    for(var r=0;r<rows;r++)for(var c=0;c<cols;c++){
      if(Math.random()>.42){
        var lit=Math.random()>.3;
        var wm=new THREE.Mesh(new THREE.PlaneGeometry(.44,.54),
          new THREE.MeshBasicMaterial({
            color:lit?(Math.random()>.7?0xFFCC66:0xAADDFF):0x111827,
            transparent:true,opacity:lit?(.55+Math.random()*.35):.45}));
        var sx=x>0?-(d/2+.01):(d/2+.01);
        wm.position.set(x+(c-(cols-1)/2)*1.1,.8+r*1.35,z+sx*(x>0?-1:1));
        wm.rotation.y=x>0?Math.PI/2:-Math.PI/2;scene.add(wm);
      }
    }
  }
  [[-10,10,4,14,8],[-14,25,5,20,10],[-9,42,3,10,7],[-13,55,6,24,11],
   [-10,70,4,16,8],[-14,85,5,18,10],[-9,100,4,12,7],
   [10,8,4,12,8],[14,22,6,22,12],[9,40,3,9,7],[13,52,5,20,10],
   [10,68,4,14,8],[14,82,6,26,12],[10,96,4,11,7]
  ].forEach(function(b){mkBuilding(b[0],b[1],b[2],b[3],b[4]);});

  // Street lights
  var poleMat=new THREE.MeshStandardMaterial({color:0x334155});
  for(var i=0;i<15;i++){
    [-6.5,6.5].forEach(function(sx){
      var pole=new THREE.Mesh(new THREE.CylinderGeometry(.06,.06,5,8),poleMat);
      pole.position.set(sx,2.5,i*12+4);scene.add(pole);
      var pl=new THREE.PointLight(0xffd280,.8,18);
      pl.position.set(sx*(sx>0?.85:1.15),5.2,i*12+4);scene.add(pl);
      var hd=new THREE.Mesh(new THREE.SphereGeometry(.17,8,8),
        new THREE.MeshBasicMaterial({color:0xffd280}));
      hd.position.copy(pl.position);scene.add(hd);
    });
  }

  // Cars
  function mkCar(z,lane,oc){
    var g=new THREE.Group();
    var body=new THREE.Mesh(new THREE.BoxGeometry(1.6,.55,3.2),
      new THREE.MeshStandardMaterial({color:oc?0x1a3a5c:0x1c2030,roughness:.5,metalness:.3}));
    body.position.y=.48;g.add(body);
    var roof=new THREE.Mesh(new THREE.BoxGeometry(1.3,.44,1.8),
      new THREE.MeshStandardMaterial({color:oc?0x142b45:0x151a28,roughness:.6}));
    roof.position.set(0,.96,.1);g.add(roof);
    var lc=oc?0xffffff:0xff2200;
    [[-.55,.48,oc?1.65:-1.65],[.55,.48,oc?1.65:-1.65]].forEach(function(p){
      var lm=new THREE.Mesh(new THREE.SphereGeometry(.12,8,8),
        new THREE.MeshBasicMaterial({color:lc}));
      lm.position.set(p[0],p[1],p[2]);g.add(lm);
      var pl=new THREE.PointLight(lc,oc?1.5:.8,8);
      pl.position.set(p[0],p[1],p[2]);g.add(pl);
    });
    g.position.set(lane,0,z);
    if(oc)g.rotation.y=Math.PI;
    return g;
  }
  var cars=[];
  [{z:18,lane:-2,oc:false,spd:.18},{z:34,lane:2,oc:true,spd:.14},
   {z:54,lane:-2,oc:false,spd:.2},{z:70,lane:2,oc:true,spd:.16},
   {z:90,lane:-2,oc:false,spd:.19},{z:10,lane:2.5,oc:true,spd:.13}
  ].forEach(function(d){
    var c=mkCar(d.z,d.lane,d.oc);c.userData={spd:d.spd};scene.add(c);cars.push(c);
  });

  // Rain
  var DROPS=3600;
  var pos=new Float32Array(DROPS*3),vel=new Float32Array(DROPS);
  for(var i=0;i<DROPS;i++){
    pos[i*3]=(Math.random()-.5)*40;pos[i*3+1]=Math.random()*25;pos[i*3+2]=Math.random()*120;
    vel[i]=.07+Math.random()*.13;
  }
  var rainGeo=new THREE.BufferGeometry();
  rainGeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(rainGeo,new THREE.PointsMaterial({
    color:0x88aacc,size:.055,transparent:true,opacity:.32,sizeAttenuation:true})));

  // Wet reflection
  var refl=new THREE.Mesh(new THREE.PlaneGeometry(12,200),
    new THREE.MeshStandardMaterial({color:0x0d1117,roughness:.05,metalness:.85,transparent:true,opacity:.55}));
  refl.rotation.x=-Math.PI/2;refl.position.set(0,.005,80);scene.add(refl);

  var t=0;
  (function animate(){
    requestAnimationFrame(animate);t+=.016;
    var pa=rainGeo.attributes.position.array;
    for(var i=0;i<DROPS;i++){
      pa[i*3+1]-=vel[i];
      if(pa[i*3+1]<-.5){pa[i*3+1]=25;pa[i*3]=(Math.random()-.5)*40;pa[i*3+2]=Math.random()*120;}
    }
    rainGeo.attributes.position.needsUpdate=true;
    cars.forEach(function(c){c.position.z-=c.userData.spd;if(c.position.z<-5)c.position.z=110;});
    camera.position.x=Math.sin(t*.08)*.16;camera.lookAt(0,1.2,20);
    renderer.render(scene,camera);
  })();

  window.addEventListener('resize',function(){
    W=innerWidth;H=innerHeight;
    camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);
  });
})();
</script>
</body>
</html>
